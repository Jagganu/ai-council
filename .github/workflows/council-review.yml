name: AI Council PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:

jobs:
  council-review:
    runs-on: ubuntu-latest
    name: AI Council Code Review
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AI Council
        run: npm install -g @ai-council/cli

      - name: Get PR Info
        id: pr_info
        run: |
          echo "title=$(echo '${{ github.event.pull_request.title }}' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "body=$(echo '${{ github.event.pull_request.body }}' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "files=${{ join(fromJSON('[```diff', '```']), '\n') }}" >> $GITHUB_OUTPUT

      - name: Run AI Council Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "# AI Council Code Review" > review.md
          echo "" >> review.md
          echo "## PR: ${{ github.event.pull_request.title }}" >> review.md
          echo "" >> review.md
          council review "${{ github.event.pull_request.title }}" --format markdown >> review.md 2>&1
          cat review.md

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf-8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });